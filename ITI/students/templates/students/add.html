{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}

{% block content %}
<a href="{% url 'show_students' %}" class="back-link">&#8592; Back to Students</a>

<div class="page-header">
    <h1 class="page-title">Add Student</h1>
</div>

<div class="form-card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" required>
        </div>
        <div class="form-group">
            <label>Class Year</label>
            <input type="text" name="class_year" placeholder="e.g. 2026" required>
        </div>
        <div class="form-group">
            <label>Enrollment Date</label>
            <input type="date" name="enrollment_date" required>
        </div>
        <div class="form-group">
            <label>Photo <span style="color:#475569; font-weight:400; text-transform:none;">(optional)</span></label>
            <input type="file" name="photo" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">Add Student</button>
    </form>
</div>
{% endblock %}
