{% extends 'base.html' %}
{% block title %}Add Instructor{% endblock %}

{% block content %}
<a href="{% url 'list_instructors' %}" class="back-link">&#8592; Back to Staff</a>

<div class="page-header">
    <h1 class="page-title">Add Instructor</h1>
</div>

<div class="form-card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" required>
        </div>
        <div class="form-group">
            <label>Photo <span style="color:#475569; font-weight:400; text-transform:none;">(optional)</span></label>
            <input type="file" name="photo" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">Add Instructor</button>
    </form>
</div>
{% endblock %}
