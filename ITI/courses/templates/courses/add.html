{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}

{% block content %}
<a href="{% url 'list_courses' %}" class="back-link">&#8592; Back to Courses</a>

<div class="page-header">
    <h1 class="page-title">Add Course</h1>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Course Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Code</label>
            <input type="text" name="code" placeholder="e.g. CS101" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description"></textarea>
        </div>
        <div class="form-group">
            <label>Credits</label>
            <input type="number" name="credits" min="1" required>
        </div>
        <div class="form-group">
            <label>Instructor</label>
            <select name="instructor">
                <option value="">No instructor</option>
                {% for inst in instructors %}
                <option value="{{ inst.pk }}">{{ inst.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Course</button>
    </form>
</div>
{% endblock %}
